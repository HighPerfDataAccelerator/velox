# A workflow to trigger ci on hybrid infra (github + self hosted runner)
name: Blossom-CI
on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      mode:
        description: Operation to exercise.
        required: true
        default: post-processing
        type: choice
        options:
          - post-processing
          - runner-smoke
      platform:
        description: runs-on argument
        required: false
      args:
        description: argument
        required: false

permissions:
  contents: read
  pull-requests: read

jobs:
  Authorization:
    name: Authorization
    runs-on: blossom
    outputs:
      args: ${{ env.args }}

    # This job only runs for pull request comments
    if: |
      github.event.issue.pull_request &&
      github.event.comment.body == 'build' &&
      (
        github.actor == 'binmahone' ||
        github.actor == 'firestarman' ||
        github.actor == 'GaryShen2008' ||
        github.actor == 'liurenjie1024' ||
        github.actor == 'NvTimLiu' ||
        github.actor == 'pxLi' ||
        github.actor == 'res-life' ||
        github.actor == 'sperlingxx' ||
        github.actor == 'thirtiseven' ||
        github.actor == 'winningsix' ||
        github.actor == 'wjxiz1992' ||
        github.actor == 'YanxuanLiu' ||
        github.actor == 'yinqingh' ||
        false
      )
    steps:
      - name: Check if comment is issued by authorized person
        run: blossom-ci
        env:
          OPERATION: AUTH
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_KEY_DATA: ${{ secrets.BLOSSOM_KEY }}

  Vulnerability-scan:
    name: Vulnerability scan
    needs: [Authorization]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: ${{ fromJson(needs.Authorization.outputs.args).repo }}
          ref: ${{ fromJson(needs.Authorization.outputs.args).ref }}
          lfs: 'true'
          persist-credentials: false

      # repo specific steps
      - name: Setup java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: adopt
          java-version: 8

      # add blackduck properties https://synopsys.atlassian.net/wiki/spaces/INTDOCS/pages/631308372/Methods+for+Configuring+Analysis#Using-a-configuration-file
      # currently hardcode projects here to avoid intermittent mvn scan failures
      - name: Setup blackduck properties
        run: |
          echo detect.maven.build.command="-pl=com.nvidia:rapids-4-spark-parent,com.nvidia:rapids-4-spark-sql_2.12 -am" >> application.properties
          echo detect.maven.included.scopes=compile >> application.properties

      - name: Run blossom action
        uses: NVIDIA/blossom-action@2b0c950b993808dc31f80a1ccc32615902e39032 # main
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_KEY_DATA: ${{ secrets.BLOSSOM_KEY }}
        with:
          args1: ${{ fromJson(needs.Authorization.outputs.args).args1 }}
          args2: ${{ fromJson(needs.Authorization.outputs.args).args2 }}
          args3: ${{ fromJson(needs.Authorization.outputs.args).args3 }}

  Job-trigger:
    name: Start ci job
    needs: [Vulnerability-scan]
    runs-on: blossom
    steps:
      - name: Start ci job
        run: blossom-ci
        env:
          OPERATION: START-CI-JOB
          CI_SERVER: ${{ secrets.CI_SERVER }}
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  Runner-smoke:
    name: Blossom runner smoke
    runs-on: blossom
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'runner-smoke'
    timeout-minutes: 5
    steps:
      - name: Verify Blossom CLI
        run: |
          if ! blossom_path="$(command -v blossom-ci)"; then
            echo "::error::The blossom-ci command is not installed on this runner."
            exit 1
          fi
          echo "Blossom CLI is available at $blossom_path"

  Upload-Log:
    name: Upload log
    runs-on: blossom
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'post-processing'
    steps:
      - name: Jenkins log for pull request ${{ fromJson(github.event.inputs.args).pr }} (click here)
        run: blossom-ci
        env:
          OPERATION: POST-PROCESSING
          CI_SERVER: ${{ secrets.CI_SERVER }}
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
